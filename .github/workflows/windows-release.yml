name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[build]

      - name: Generate icon and version metadata
        shell: pwsh
        run: |
          python .\scripts\generate_icon.py
          $env:PYTHONPATH = "$PWD\src"
          python .\scripts\write_version_info.py

      - name: Build application
        shell: pwsh
        run: pyinstaller .\projection-software-converter.spec --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD\src"
          $env:APP_VERSION = (python -c "from projection_software_converter.version import __version__; print(__version__)")
          iscc .\installer\ProjectionSoftwareConverter.iss

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-ChildItem .\dist\installer\*.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Set-Content "$($_.FullName).sha256"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: projection-software-converter-windows
          path: |
            dist/Projection Software Converter/**
            dist/installer/*.exe
            dist/installer/*.sha256

      - name: Attach release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: |
            dist/installer/*.exe
            dist/installer/*.sha256
