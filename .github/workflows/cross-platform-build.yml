name: cross-platform-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            archive_label: windows
            archive_extension: zip
          - os: macos-latest
            platform: macos
            archive_label: macOS
            archive_extension: zip
          - os: ubuntu-latest
            platform: linux
            archive_label: linux
            archive_extension: tar.gz

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [[ "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(python -c "from pathlib import Path; import re; text=Path('src/projection_software_converter/version.py').read_text(encoding='utf-8'); print(re.search(r\"__version__\\s*=\\s*\\\"([^\\\"]+)\\\"\", text).group(1))")
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[build]

      - name: Generate Windows build metadata
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python .\scripts\generate_icon.py
          python .\scripts\write_version_info.py

      - name: Run portable tests
        env:
          PYTHONPATH: src
        run: python -m unittest tests.test_updater tests.test_easyworship_tools -v

      - name: Build application bundle
        run: python -m PyInstaller projection-software-converter.spec --noconfirm

      - name: Archive Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = ".\dist\ProjectionSoftwareConverter-${{ steps.version.outputs.value }}-${{ matrix.archive_label }}.${{ matrix.archive_extension }}"
          Compress-Archive -Path ".\dist\Projection Software Converter\*" -DestinationPath $archive -Force

      - name: Archive macOS app bundle
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/Projection Software Converter.app" "dist/ProjectionSoftwareConverter-${{ steps.version.outputs.value }}-${{ matrix.archive_label }}.${{ matrix.archive_extension }}"

      - name: Archive Linux bundle
        if: runner.os == 'Linux'
        run: |
          tar -C dist -czf "dist/ProjectionSoftwareConverter-${{ steps.version.outputs.value }}-${{ matrix.archive_label }}.${{ matrix.archive_extension }}" "Projection Software Converter"

      - name: Generate archive checksum
        shell: bash
        run: |
          archive_path="dist/ProjectionSoftwareConverter-${{ steps.version.outputs.value }}-${{ matrix.archive_label }}.${{ matrix.archive_extension }}"
          sha256sum "$archive_path" > "$archive_path.sha256"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: ProjectionSoftwareConverter-${{ steps.version.outputs.value }}-${{ matrix.archive_label }}
          path: |
            dist/ProjectionSoftwareConverter-${{ steps.version.outputs.value }}-${{ matrix.archive_label }}.${{ matrix.archive_extension }}
            dist/ProjectionSoftwareConverter-${{ steps.version.outputs.value }}-${{ matrix.archive_label }}.${{ matrix.archive_extension }}.sha256
            dist/Projection Software Converter/**
            dist/Projection Software Converter.app/**

      - name: Attach native release assets
        if: github.event_name == 'release' && runner.os != 'Windows'
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: |
            dist/ProjectionSoftwareConverter-${{ steps.version.outputs.value }}-${{ matrix.archive_label }}.${{ matrix.archive_extension }}
            dist/ProjectionSoftwareConverter-${{ steps.version.outputs.value }}-${{ matrix.archive_label }}.${{ matrix.archive_extension }}.sha256
